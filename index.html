<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サッカーチーム出欠管理アプリ v1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>サッカーチーム出欠管理</h1>
      <p>練習や試合の出欠をまとめて確認できるアプリです．</p>
    </header>

    <section class="summary">
      <div class="card">
        <span>出席</span>
        <strong id="presentCount">0</strong>
      </div>
      <div class="card">
        <span>欠席</span>
        <strong id="absentCount">0</strong>
      </div>
      <div class="card">
        <span>遅刻</span>
        <strong id="lateCount">0</strong>
      </div>
    </section>

    <section class="form-area">
      <h2>出欠を登録</h2>

      <input type="text" id="nameInput" placeholder="名前を入力">

      <select id="statusInput">
        <option value="出席">出席</option>
        <option value="欠席">欠席</option>
        <option value="遅刻">遅刻</option>
      </select>

      <textarea id="commentInput" placeholder="理由・コメントを入力"></textarea>

      <button id="addButton">登録する</button>
    </section>

    <section class="list-area">
      <h2>出欠一覧</h2>
      <ul id="attendanceList"></ul>
    </section>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
